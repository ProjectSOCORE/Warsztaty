<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCORE</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #003366;
            color: white;
            text-align: center;
            padding: 50px 20px;
        }

        img {
            max-width: 300px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #ffcc00;
            color: black;
            text-decoration: none;
        }

        section {
            padding: 40px 20px;
        }
    </style>
</head>

<body>

<header>
    <img src="logo.png" alt="Uniwersytet Śląski w Katowicach">
    <h1>SOCORE</h1>
    <p>Kompetencje dla innowacji w województwie śląskim</p>
    <a href="#kontakt" class="btn">Dołącz</a>
</header>

<section>
    <h2>O projekcie</h2>
    <p>SOCORE wspiera rozwój kompetencji dla innowacji i współpracy nauki z biznesem.</p>
</section>

<section id="kontakt">
    <h2>Kontakt</h2>
    <p>Tu wpisz dane kontaktowe</p>
</section>

</body>
</html>
